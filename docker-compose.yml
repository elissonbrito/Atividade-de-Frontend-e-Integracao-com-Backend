version: '3.9'

services:
  # ─── Banco de dados NoSQL ───────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Banco de dados SQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: api_users
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d api_users"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: chave_super_secreta_troque_em_producao_minimo_32_chars
      JWT_EXPIRES_IN: 24h
      MONGO_URI: mongodb://mongo:27017/api_db
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: api_users
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
      CORS_ORIGIN: http://localhost:80
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Frontend React ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3001
    container_name: frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

  # ─── Testes (roda e encerra) ─────────────────────────────────────────────────
  tests:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: backend_tests
    environment:
      NODE_ENV: test
      JWT_SECRET: test_secret_for_jest_only
      MONGO_URI: mongodb://mongo:27017/api_test
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: api_test
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpassword
    depends_on:
      mongo:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - test

# ─── Volumes e Redes ────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  postgres_data:

networks:
  app_network:
    driver: bridge
